name: TestFlight Release

# 触发条件：
#   - 打 tag（git tag v*.*.*）推送到 main
#   - 手动 workflow_dispatch
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - minor
          - major

env:
  NODE_VERSION: "22"
  IOS_BUNDLE_ID: "com.openclaw.aibrainim"
  APP_NAME: "AIBrainIM"

jobs:
  # ── Build & Upload to TestFlight ───────────────────────────────────────────────
  testflight:
    name: Build & Upload TestFlight
    runs-on: macos-15
    environment: App Store Connect
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Install Pods
        run: cd ios && pod install && cd ..

      # Bump build number to current GitHub run number
      - name: Set Info.plist build version
        run: |
          BUILD_NUM=${{ github.run_number }}
          PLIST=ios/AIBrainIM/Info.plist
          if grep -q CFBundleVersion "$PLIST"; then
            sed -i '' "s/<key>CFBundleVersion<\/key><string>[^<]*<\/string>/<key>CFBundleVersion<\/key><string>${BUILD_NUM}<\/string>/" "$PLIST"
          fi
          echo "Build number set to: ${BUILD_NUM}"

      - name: Build for Release (Archive)
        run: |
          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Release \
            -archivePath build/AIBrainIM.xcarchive \
            -derivedDataPath build/DerivedData \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ vars.APPLE_TEAM_ID }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivepath build/AIBrainIM.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ vars.APPLE_TEAM_ID }}

      - name: List build artifacts
        run: ls -la build/

      # ── Upload via altool (App Store Connect API Key auth) ─────────────────────
      # Setup (GitHub repo → Settings → Secrets and variables → Actions):
      #   Secrets:
      #     APPLE_API_KEY_ID        — from App Store Connect → Users & Access → Keys
      #     APPLE_API_KEY_CONTENT   — raw .p8 PEM file content (NOT base64 encoded)
      #   Variables:
      #     APPLE_TEAM_ID           — your Apple Team ID (not Team Name)
      - name: Upload to App Store Connect
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          IPA_PATH="build/AIBrainIM.ipa"

          # Write .p8 key to temp file (API key auth — no username/password needed)
          KEY_FILE=$(mktemp /tmp/api_key.p8)
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_FILE"

          # Validate it looks like a PEM before uploading
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_FILE"; then
            echo "ERROR: APPLE_API_KEY_CONTENT does not look like a valid PEM private key"
            cat "$KEY_FILE"
            exit 1
          fi

          xcrun altool \
            --upload-app \
            -type ios \
            -file "$IPA_PATH" \
            -apiKey "$APPLE_API_KEY_ID" \
            -apiKeyPath "$KEY_FILE"

          rm -f "$KEY_FILE"

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "AIBrainIM ${{ github.ref }}"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Post-build notification ───────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: testflight
    if: always()
    steps:
      - name: Summary
        run: |
          if [[ "${{ needs.testflight.result }}" == "success" ]]; then
            echo "✅ TestFlight upload succeeded. Check App Store Connect for processing (~5-30 min)."
          else
            echo "❌ TestFlight build/upload failed. Check logs above."
            exit 1
          fi