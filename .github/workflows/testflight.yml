name: TestFlight Release
'on':
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}
env:
  APP_NAME: AIBrainIM
  ASC_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
  ASC_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
  APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  build:
    runs-on:
      - self-hosted
      - macos
      - xcode-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Apple CI inputs
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          npm ci
          npm run preflight:testflight

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install npm deps
        run: |
          npm ci

      # Step 1: Explicitly build fresh Hermes bytecode bundle BEFORE archive.
      # This ensures the bundle is regenerated from current code, regardless of DerivedData cache.
      # Bundle phase NOT removed - xcodebuild handles bundling naturally
    
      - name: Install Ruby 3.3
        run: |
          if [ ! -f /opt/homebrew/opt/ruby@3.3/bin/ruby ]; then
            brew install ruby@3.3
          fi
          export PATH="/opt/homebrew/opt/ruby@3.3/bin:/opt/homebrew/lib/ruby/gems/3.3.0/bin:$PATH"
          ruby --version
          gem --version

      - name: Re-install npm dependencies (clean)
        run: |
          # npm ci can fail on runners due to cache issues; use npm install + force
          rm -rf node_modules
          npm cache clean --force
          npm install --prefer-offline=false
          # Diagnostic
          echo "=== react package main field ==="
          node -p "require('./node_modules/react/package.json').main"
          echo "=== react version ==="
          node -p "require('./node_modules/react/package.json').version"
          echo "=== react index.js exists? ==="
          ls node_modules/react/index.js 2>/dev/null && echo "YES" || echo "NO"

      - name: Install CocoaPods
        run: |
          export PATH="/opt/homebrew/opt/ruby@3.3/bin:/opt/homebrew/lib/ruby/gems/3.3.0/bin:$PATH"
          gem install cocoapods --no-document || true
          which pod && pod --version || true

      - name: Install Pods
        run: |
          export PATH="/opt/homebrew/opt/ruby@3.3/bin:/opt/homebrew/lib/ruby/gems/3.3.0/bin:$PATH"
          pod install
        working-directory: ios

      - name: Build JS bundle (Hermes bytecode) for device archive
        run: |
          BUNDLE_OUT="build/DerivedData/Build/Products/Release-iphoneos/main.jsbundle"
          APP_DIR="build/DerivedData/Build/Products/Release-iphoneos/AIBrainIM.app"
          mkdir -p "$(dirname "$BUNDLE_OUT")" "$APP_DIR"
          # Step 1: Create plain JS bundle
          npx react-native bundle --platform ios --dev false --entry-file index.js --bundle-output "$BUNDLE_OUT" --assets-dest "$APP_DIR" --minify true --reset-cache 2>&1 | tail -5
          echo "Plain bundle created at $(date)"
          # Step 2: Compile to Hermes bytecode (.hbc)
          HERMES_CLI_PATH="node_modules/hermes-compiler/hermesc/osx-bin/hermesc"
          "$HERMES_CLI_PATH" -emit-binary -O -out "$APP_DIR/main.jsbundle" "$BUNDLE_OUT" && echo "Hermes bytecode compiled: $(wc -c < "$APP_DIR/main.jsbundle") bytes" || { echo "Hermes compile failed"; exit 1; }
          echo "Bundle built at $(date)"
      - name: Set Info.plist build version
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set CFBundleVersion $BUILD_NUMBER" ios/AIBrainIM/Info.plist

      - name: Write API key decode script
        run: |
          cat > /tmp/decode_asc_key.py << 'PYEOF'
          import os, base64, pathlib
          raw = os.environ.get('APPLE_API_KEY_CONTENT', '')
          kid = os.environ.get('ASC_KEY_ID', '').strip()
          out_path = str(pathlib.Path.home()) + '/private_keys/AuthKey_' + kid + '.p8'
          raw_s = raw.strip()
          data = raw_s.encode('utf-8') if '-----BEGIN' in raw_s else base64.b64decode(raw_s)
          pathlib.Path(out_path).write_bytes(data)
          os.chmod(out_path, 0o600)
          print(len(data))
          PYEOF

      - name: Decode API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          python3 /tmp/decode_asc_key.py

      - name: Create ExportOptions.plist
        run: |
          python3 -c "
          import os
          team = os.environ.get('APPLE_TEAM_ID', '').strip()
          xml = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>teamID</key><string>''' + team + '''</string>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>allowProvisioningUpdates</key><true/>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>stripSwiftSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>'''
          open('/tmp/ExportOptions.plist', 'w').write(xml)
          print('ExportOptions.plist created')
          "

      - name: Archive for App Store Connect
        run: |
          mkdir -p build
          set -o pipefail
          export DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer
          # Skip bundle phase: the bundle is pre-built by "Build JS bundle" step.
          # xcodebuild Bundle phase runs Metro which fails to resolve react module on CI.
          export USE_HERMES=true  # Must be true so native links Hermes engine; bundle is pre-built as Hermes bytecode
          export RCT_NO_LAUNCH_PACKAGER=1
          # Remove bundle phase so archive succeeds without hermes path issues
          python3 scripts/remove_bundle_phase.py || true
          xcodebuild -workspace ios/AIBrainIM.xcworkspace -scheme AIBrainIM -configuration Release -destination generic/platform=iOS -archivePath build/AIBrainIM.xcarchive -derivedDataPath build/DerivedData -sdk iphoneos26.5 CODE_SIGN_STYLE=Manual CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="-" DEVELOPMENT_TEAM="$APPLE_TEAM_ID" archive 2>&1 | tee build/archive.log

      - name: Inject pre-built JS bundle into xcarchive
        run: |
          # Bundle phase is disabled; manually inject the pre-built bundle into the xcarchive.
          # xcodebuild -exportArchive reads from xcarchive contents, so this injection works.
          BUNDLE_SRC="build/DerivedData/Build/Products/Release-iphoneos/AIBrainIM.app/main.jsbundle"
          BUNDLE_DST="build/AIBrainIM.xcarchive/Products/Applications/AIBrainIM.app/main.jsbundle"
          mkdir -p "build/AIBrainIM.xcarchive/Products/Applications/AIBrainIM.app/"
          if [ -f "$BUNDLE_SRC" ]; then
            cp "$BUNDLE_SRC" "$BUNDLE_DST"
            echo "Bundle injected: $(wc -c < "$BUNDLE_DST") bytes"
          else
            echo "ERROR: Pre-built bundle not found at $BUNDLE_SRC"
            ls -la build/DerivedData/Build/Products/Release-iphoneos/AIBrainIM.app/ 2>/dev/null | head -10
            exit 1
          fi
          ls -la "$BUNDLE_DST"
      - name: Export IPA (manual repack + sign)
        run: |
          set -o pipefail
          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"
          # Extract xcarchive's .app (has injected bundle, unsigned from archive)
          cp -R /Users/zz/actions-runner/live/_work/AIBrainIM/AIBrainIM/build/AIBrainIM.xcarchive/Products/Applications/AIBrainIM.app .
          # Verify bundle is present
          if [ -f AIBrainIM.app/main.jsbundle ]; then
            echo "Bundle verified: $(wc -c < AIBrainIM.app/main.jsbundle) bytes"
          else
            echo "ERROR: Bundle missing from .app"
            exit 1
          fi
          # Sign the .app for App Store distribution
          /usr/bin/codesign --force --sign "iPhone Distribution: Hong Yang (7S96N8A32U)" --deep AIBrainIM.app 2>&1
          echo "Signed .app"
          # Create properly-structured IPA
          mkdir -p Payload Symbols
          cp -R AIBrainIM.app Payload/
          cp -R /Users/zz/actions-runner/live/_work/AIBrainIM/AIBrainIM/build/AIBrainIM.xcarchive/dSYMs AIBrainIM.app.dSYM Symbols/ 2>/dev/null || true
          # Re-pack with Payload structure
          mkdir -p /Users/zz/actions-runner/live/_work/AIBrainIM/AIBrainIM/build/export
          rm -f /Users/zz/actions-runner/live/_work/AIBrainIM/AIBrainIM/build/export/AIBrainIM.ipa
          zip -q -r /Users/zz/actions-runner/live/_work/AIBrainIM/AIBrainIM/build/export/AIBrainIM.ipa Payload Symbols
          echo "IPA created: $(wc -c < /Users/zz/actions-runner/live/_work/AIBrainIM/AIBrainIM/build/export/AIBrainIM.ipa) bytes"
          rm -rf "$WORK_DIR"

      - name: Verify IPA
        run: |
          IPA_PATH=$(find build/export -name '*.ipa' | head -1)
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "ERROR: No IPA found"
            find build -maxdepth 3 -type f | sort
            exit 1
          fi
          echo "IPA=$IPA_PATH ($(du -h $IPA_PATH | cut -f1))"

      - name: Upload to App Store Connect
        run: |
          set -o pipefail
          IPA_PATH=$(find build/export -name '*.ipa' | head -1)
          xcrun altool --upload-app -f "$IPA_PATH" -t ios --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" --apiKey-path ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 2>&1 | tee build/upload.log

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: build/archive.log build/export.log
          if-no-files-found: ignore
