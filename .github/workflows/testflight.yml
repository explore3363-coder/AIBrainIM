name: TestFlight Release
'on':
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}
env:
  APP_NAME: AIBrainIM
  ASC_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
  ASC_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
  APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  build:
    runs-on:
      - self-hosted
      - macos
      - xcode-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Apple CI inputs
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          npm ci
          npm run preflight:testflight

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install npm deps
        run: |
          npm ci

      - name: Remove Bundle React Native script phase for device archive
        run: |
          echo "=== Removing Bundle React Native script phase using Python plistlib ==="
          python3 - << 'PYEOF'
          import plistlib

          proj_file = "ios/AIBrainIM.xcodeproj/project.pbxproj"
          with open(proj_file, "rb") as f:
              plist = plistlib.load(f)

          bundle_uuid = None
          objects = plist.get("objects", {})
          targets = plist.get("targets", [])

          for target in targets:
              build_phases = target.get("buildPhases", [])
              filtered = []
              for phase_uuid in build_phases:
                  phase = objects.get(phase_uuid, {})
                  if phase.get("isa") == "PBXShellScriptBuildPhase":
                      name = phase.get("name", "")
                      if "Bundle React Native" in name:
                          bundle_uuid = phase_uuid
                          print(f"Found bundle phase: {phase_uuid} ({name})")
                          continue  # Skip = remove
                  filtered.append(phase_uuid)
              target["buildPhases"] = filtered

          if bundle_uuid and bundle_uuid in objects:
              del objects[bundle_uuid]
              print(f"Removed bundle phase object: {bundle_uuid}")

              with open(proj_file, "wb") as f:
                  plistlib.dump(plist, f)
              print("Bundle phase removed successfully")
          else:
              print("Bundle phase not found")
          PYEOF
    
      - name: Install Ruby 3.3
        run: |
          if [ ! -f /opt/homebrew/opt/ruby@3.3/bin/ruby ]; then
            brew install ruby@3.3
          fi
          export PATH="/opt/homebrew/opt/ruby@3.3/bin:/opt/homebrew/lib/ruby/gems/3.3.0/bin:$PATH"
          ruby --version
          gem --version

      - name: Install CocoaPods
        run: |
          export PATH="/opt/homebrew/opt/ruby@3.3/bin:/opt/homebrew/lib/ruby/gems/3.3.0/bin:$PATH"
          gem install cocoapods --no-document || true
          which pod && pod --version || true

      - name: Install Pods
        run: |
          export PATH="/opt/homebrew/opt/ruby@3.3/bin:/opt/homebrew/lib/ruby/gems/3.3.0/bin:$PATH"
          pod install
        working-directory: ios

      - name: Set Info.plist build version
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set CFBundleVersion $BUILD_NUMBER" ios/AIBrainIM/Info.plist

      - name: Write API key decode script
        run: |
          cat > /tmp/decode_asc_key.py << 'PYEOF'
          import os, base64, pathlib
          raw = os.environ.get('APPLE_API_KEY_CONTENT', '')
          kid = os.environ.get('ASC_KEY_ID', '').strip()
          out_path = str(pathlib.Path.home()) + '/private_keys/AuthKey_' + kid + '.p8'
          raw_s = raw.strip()
          data = raw_s.encode('utf-8') if '-----BEGIN' in raw_s else base64.b64decode(raw_s)
          pathlib.Path(out_path).write_bytes(data)
          os.chmod(out_path, 0o600)
          print(len(data))
          PYEOF

      - name: Decode API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          python3 /tmp/decode_asc_key.py

      - name: Create ExportOptions.plist
        run: |
          python3 -c "
          import os
          team = os.environ.get('APPLE_TEAM_ID', '').strip()
          xml = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>allowProvisioningUpdates</key><true/>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>'''
          open('/tmp/ExportOptions.plist', 'w').write(xml)
          print('ExportOptions.plist created')
          "

      - name: Archive for App Store Connect
        run: |
          mkdir -p build
          set -o pipefail
          # Force Xcode 26 + iOS 26.4 SDK to satisfy App Store Connect minimum requirement
          export DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer
          # CODE_SIGNING_ALLOWED=NO for Pods targets is set in Podfile post_install
          # Automatic signing: Xcode auto-selects installed cert + provisioning profile
          xcodebuild -workspace ios/AIBrainIM.xcworkspace -scheme AIBrainIM -configuration Release -destination generic/platform=iOS -archivePath build/AIBrainIM.xcarchive -derivedDataPath build/DerivedData -sdk iphoneos26.5 CODE_SIGN_STYLE=Manual CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY='-' DEVELOPMENT_TEAM="$APPLE_TEAM_ID" archive 2>&1 | tee build/archive.log

      - name: Export IPA and sign for App Store Connect
        run: |
          set -o pipefail
          # Re-export using the archive's embedded signature (signingCertificate="-" preserves it)
          # ASC authentication is handled by altool in the upload step
          xcodebuild -exportArchive -archivePath build/AIBrainIM.xcarchive -exportPath build/export -exportOptionsPlist /tmp/ExportOptions.plist 2>&1 | tee build/export.log

      - name: Verify IPA
        run: |
          IPA_PATH=$(find build/export -name '*.ipa' | head -1)
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "ERROR: No IPA found"
            find build -maxdepth 3 -type f | sort
            exit 1
          fi
          echo "IPA=$IPA_PATH ($(du -h $IPA_PATH | cut -f1))"

      - name: Upload to App Store Connect
        run: |
          set -o pipefail
          IPA_PATH=$(find build/export -name '*.ipa' | head -1)
          xcrun altool --upload-app -f "$IPA_PATH" -t ios --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" --apiKey-path ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 2>&1 | tee build/upload.log

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: build/archive.log build/export.log
          if-no-files-found: ignore
