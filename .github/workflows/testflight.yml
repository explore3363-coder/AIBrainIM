name: TestFlight Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  testflight:
    name: Build & Upload TestFlight
    runs-on: macos-15
    environment: App Store Connect
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Install Pods
        run: cd ios && pod install && cd ..

      - name: Set Info.plist build version
        run: |
          BUILD_NUM=${{ github.run_number }}
          PLIST=ios/AIBrainIM/Info.plist
          if grep -q CFBundleVersion "$PLIST"; then
            sed -i '' "s/<key>CFBundleVersion<\/key><string>[^<]*<\/string>/<key>CFBundleVersion<\/key><string>${BUILD_NUM}<\/string>/" "$PLIST"
          fi
          echo "Build number set to: ${BUILD_NUM}"

      # ── Step 1: Setup keychain ──────────────────────────────────────────────
      - name: Setup keychain
        run: |
          mkdir -p ~/Library/Keychains
          security create-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db
          security set-keychain-settings -t 3600 -u ~/Library/Keychains/build.keychain-db
          security list-keychains -s ~/Library/Keychains/build.keychain-db

          # Download WWDR G3
          curl -s -o /tmp/wwdrg3.der http://certs.apple.com/wwdrg3.der
          openssl x509 -inform DER -in /tmp/wwdrg3.der -out /tmp/wwdrg3.pem
          security import /tmp/wwdrg3.pem -k ~/Library/Keychains/build.keychain-db -T /usr/bin/codesign -T /usr/bin/security
          echo "Keychain and WWDR G3 ready"

      # ── Step 2: Decode p8 key ────────────────────────────────────────────────
      - name: Decode API key
        run: |
          mkdir -p ~/cert_work
          echo -n "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 -d > ~/cert_work/p8.key
          echo "p8 key decoded: $(wc -c < ~/cert_work/p8.key) bytes"

      # ── Step 3: Import distribution certificate from GitHub Secret ─────────────
      - name: Import signing certificate
        env:
          APPLE_DIST_P12: ${{ secrets.APPLE_DIST_P12 }}
        run: |
          mkdir -p ~/cert_work
          echo -n "$APPLE_DIST_P12" | base64 -d > ~/cert_work/dist.p12
          echo "p12 size: $(wc -c < ~/cert_work/dist.p12) bytes"

          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db
          security import ~/cert_work/dist.p12 -k ~/Library/Keychains/build.keychain-db \
            -P "ci-pass" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          echo "Certificate imported"
          security find-identity -v -p codesigning ~/Library/Keychains/build.keychain-db

      # ── Step 3: Install Python deps for ASC API ───────────────────────────────
      - name: Install Python deps for ASC API
        run: |
          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 -m pip install PyJWT cryptography --quiet 2>&1 | tail -2
          echo "Python deps installed"

      # ── Step 4: Create provisioning profile via ASC API ─────────────────────
      - name: Create provisioning profile via ASC API
        run: |
          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 << 'PYEOF'
          import urllib.request, json, time, jwt as pyjwt, base64, ssl, os

          with open(os.path.expanduser('~/cert_work/p8.key'), 'r') as f:
              p8_content = f.read().strip()

          kid = 'HWP45ALL8Y'
          iss = '0bc52ef9-a4c4-489e-810c-c8a80db0ab9a'

          def apple_token():
              payload = {'iss': iss, 'iat': int(time.time()), 'exp': int(time.time()) + 300, 'aud': 'appstoreconnect-v1'}
              return pyjwt.encode(payload, p8_content, algorithm='ES256', headers={'kid': kid})

          tok = apple_token()
          headers = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json', 'Accept': 'application/json'}

          # Bundle ID and cert ID are known
          asc_bundle_id = '24W72MHCCF'  # com.openclaw.aibrainim
          cert_id = '9L77KJ9P4B'  # iPhone Distribution: Hong Yang (7S96N8A32U)

          # Create AppStore profile (no devices required)
          profile_payload = json.dumps({
              'data': {
                  'type': 'profiles',
                  'attributes': {
                      'name': 'AIBrainIM-CI-AppStore',
                      'profileType': 'IOS_APP_STORE'
                  },
                  'relationships': {
                      'bundleId': {'data': {'id': asc_bundle_id, 'type': 'bundleIds'}},
                      'certificates': {'data': [{'id': cert_id, 'type': 'certificates'}]}
                  }
              }
          }).encode()

          ctx = ssl.create_default_context()

          req_profile = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/profiles',
              data=profile_payload, method='POST', headers=headers
          )
          try:
              with urllib.request.urlopen(req_profile, context=ctx, timeout=15) as resp:
                  prof_result = json.loads(resp.read().decode())
              profile_id = prof_result['data']['id']
              print(f'Profile created! ID: {profile_id}')
          except urllib.error.HTTPError as e:
              err_body = e.read()
              print(f'Profile creation error: {err_body[:300]}')
              # Try to find existing profile
              req_pf = urllib.request.Request(
                  'https://api.appstoreconnect.apple.com/v1/profiles?filter[name]=AIBrainIM-CI-AppStore',
                  headers=headers
              )
              with urllib.request.urlopen(req_pf, context=ctx, timeout=15) as resp:
                  pf_data = json.loads(resp.read().decode())
              if pf_data.get('data'):
                  profile_id = pf_data['data'][0]['id']
                  print(f'Using existing profile: {profile_id}')
              else:
                  raise Exception('No profile found')

          # Download the profile (CMS-signed DER)
          req_download = urllib.request.Request(
              f'https://api.appstoreconnect.apple.com/v1/profiles/{profile_id}',
              headers=headers
          )
          with urllib.request.urlopen(req_download, context=ctx, timeout=15) as resp:
              pf_result = json.loads(resp.read().decode())
          profile_b64 = pf_result['data']['attributes']['profileContent']
          profile_bytes = base64.b64decode(profile_b64)
          profile_path = '/tmp/profile.mobileprovision'
          with open(profile_path, 'wb') as f:
              f.write(profile_bytes)
          # Copy raw CMS data as .mobileprovision (Xcode reads UUID from CMS metadata)
          os.makedirs(os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles'), exist_ok=True)
          out_path = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles/AIBrainIM-CI-AppStore.mobileprovision')
          with open(out_path, 'wb') as f:
              f.write(profile_bytes)
          print(f'Profile installed: {out_path} ({len(profile_bytes)} bytes)')
          PYEOF

      # ── Step 4: Archive with proper signing ────────────────────────────────
      - name: Build for Release (Archive)
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db

          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Release \
            -archivePath build/AIBrainIM.xcarchive \
            -derivedDataPath build/DerivedData \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=7S96N8A32U \
            CODE_SIGNING_REQUIRED=YES

      # ── Step 5: Export IPA ──────────────────────────────────────────────────
      - name: Export IPA
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db

          xcodebuild -exportArchive \
            -archivePath build/AIBrainIM.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=7S96N8A32U

      # ── Step 6: Upload to App Store Connect ──────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APPLE_DEV_EMAIL: ${{ vars.APPLE_DEV_EMAIL }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "Uploading with email: $APPLE_DEV_EMAIL"
          xcrun altool --upload-app \
            -f build/AIBrainIM.ipa \
            -t ios \
            -u "$APPLE_DEV_EMAIL" \
            -p "$APPLE_APP_PASSWORD" \
            --team-id 7S96N8A32U \
            --upload WaitAfterProcessing 2>&1 | tail -20

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: TestFlight Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}