name: TestFlight Release

# 触发条件：
#   - 打 tag（git tag v*.*.*）推送到 main
#   - 手动 workflow_dispatch
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - minor
          - major

env:
  NODE_VERSION: "22"
  IOS_BUNDLE_ID: "com.openclaw.aibrainim"
  APP_NAME: "AIBrainIM"

jobs:
  # ── Build & Upload to TestFlight ───────────────────────────────────────────────
  testflight:
    name: Build & Upload TestFlight
    runs-on: macos-15
    environment: App Store Connect
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Install Pods
        run: cd ios && pod install && cd ..

      # Bump build number to current GitHub run number
      - name: Set Info.plist build version
        run: |
          BUILD_NUM=${{ github.run_number }}
          PLIST=ios/AIBrainIM/Info.plist
          if grep -q CFBundleVersion "$PLIST"; then
            sed -i '' "s/<key>CFBundleVersion<\/key><string>[^<]*<\/string>/<key>CFBundleVersion<\/key><string>${BUILD_NUM}<\/string>/" "$PLIST"
          fi
          echo "Build number set to: ${BUILD_NUM}"

      - name: Import code signing certificate
        env:
          APPLE_DIST_P12: ${{ secrets.APPLE_DIST_P12 }}
        run: |
          # Download WWDR G3 certificate FIRST (required for cert chain validation)
          curl -s -o /tmp/wwdrg3.der http://certs.apple.com/wwdrg3.der
          openssl x509 -inform DER -outform PEM -in /tmp/wwdrg3.der -out /tmp/wwdrg3.pem
          echo "WWDR G3 downloaded, size: $(wc -c < /tmp/wwdrg3.der) bytes"

          # Create keychain
          security create-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db
          security set-keychain-settings -t 3600 -u ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db

          # Add WWDR G3 to keychain FIRST
          security import /tmp/wwdrg3.pem -k ~/Library/Keychains/build.keychain-db -T /usr/bin/codesign -T /usr/bin/security
          echo "WWDR G3 imported to keychain"

          # Decode p12 using python3 (more reliable)
          python3 -c "
            import os, base64
            secret = os.environ.get('APPLE_DIST_P12', '')
            if not secret:
                raise Exception('APPLE_DIST_P12 is empty!')
            with open('/tmp/certificate.p12', 'wb') as f:
                f.write(base64.b64decode(secret))
            size = os.path.getsize('/tmp/certificate.p12')
            print('p12 decoded, size: {} bytes'.format(size))
          "
          echo "Certificate p12 decoded"

          # Import certificate
          security import /tmp/certificate.p12 -k ~/Library/Keychains/build.keychain-db -P "ci-pass" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple:,apple-tool:,codesign: -s -k "build-pass" ~/Library/Keychains/build.keychain-db

          # Verify
          # Add WWDR G3 certificate to keychain if not already present
          security add-certificates -k ~/Library/Keychains/build.keychain-db /tmp/wwdrg3.pem || true

          # Try codesign directly as verification (more reliable than find-identity)
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db
          KEYCHAIN=~/Library/Keychains/build.keychain-db codesign -s "iPhone Distribution: Hong Yang (7S96N8A32U)" /tmp/test_sign_$$ 2>/dev/null && echo "CERT_USABLE" || echo "CERT_MAY_NOT_WORK"
          ls -la /tmp/certificate.p12

      - name: Build for Release (Archive)
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db

          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Release \
            -archivePath build/AIBrainIM.xcarchive \
            -derivedDataPath build/DerivedData \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Hong Yang (7S96N8A32U)" \
            DEVELOPMENT_TEAM=${{ vars.APPLE_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="iPhone Distribution: Hong Yang" \
            OTHER_CODE_SIGN_FLAGS="--keychain=$HOME/Library/Keychains/build.keychain-db" \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db

          xcodebuild -exportArchive \
            -archivePath build/AIBrainIM.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Hong Yang (7S96N8A32U)" \
            DEVELOPMENT_TEAM=${{ vars.APPLE_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="iPhone Distribution: Hong Yang" \
            OTHER_CODE_SIGN_FLAGS="--keychain=$HOME/Library/Keychains/build.keychain-db"

      - name: List build artifacts
        run: ls -la build/

      # ── Upload via altool (Apple ID auth — can auto-create app in ASC) ───────
      # Uses APPLE_DEV_EMAIL + APPLE_APP_PASSWORD
      # This auth method can automatically create the App record in ASC on first upload
      - name: Upload to App Store Connect
        env:
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          IPA_PATH="build/AIBrainIM.ipa"
          echo "Uploading with email: ${{ vars.APPLE_DEV_EMAIL }}"
          xcrun altool \
            --upload-app \
            -type ios \
            -file "$IPA_PATH" \
            -u "${{ vars.APPLE_DEV_EMAIL }}" \
            -p "$APPLE_APP_PASSWORD"

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "AIBrainIM ${{ github.ref }}"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Post-build notification ───────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: testflight
    if: always()
    steps:
      - name: Summary
        run: |
          if [[ "${{ needs.testflight.result }}" == "success" ]]; then
            echo "✅ TestFlight upload succeeded. Check App Store Connect for processing (~5-30 min)."
          else
            echo "❌ TestFlight build/upload failed. Check logs above."
            exit 1
          fi