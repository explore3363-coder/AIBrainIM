name: TestFlight Release

on:
  push:
    tags:
      - 'v0.*'
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
  workflow_dispatch:

env:
  APP_NAME: AIBrainIM
  KEYCHAIN_NAME: build
  KEYCHAIN_PASS: build-pass
  ASC_KEY_ID: HWP45ALL8Y
  ASC_ISSUER_ID: 0bc52ef9-a4c4-489e-810c-c8a80db0ab9a

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install npm deps
        run: npm ci
        working-directory: ios

      - name: Install Pods
        run: pod install
        working-directory: ios

      - name: Set Info.plist build version
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set CFBundleVersion $BUILD_NUMBER" ios/AIBrainIM/Info.plist
          echo "Build number set to $BUILD_NUMBER"

      # ── Setup keychain ────────────────────────────────────────────────────
      - name: Setup keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASS" ~/Library/Keychains/$KEYCHAIN_NAME.keychain-db
          security list-keychains -s ~/Library/Keychains/$KEYCHAIN_NAME.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASS" ~/Library/Keychains/$KEYCHAIN_NAME.keychain-db
          security set-keychain-setting -t 60 -u ~/Library/Keychains/$KEYCHAIN_NAME.keychain-db 2>/dev/null || true

      # ── Decode API key ───────────────────────────────────────────────────
      - name: Decode API key
        run: |
          mkdir -p ~/cert_work
          echo "$APPLE_API_KEY_CONTENT" | base64 -d > ~/cert_work/p8.key
          chmod 600 ~/cert_work/p8.key

      # ── Generate cert + key via ASC API (no APPLE_DIST_P12 needed) ───────
      - name: Generate certificate via ASC API
        run: |
          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 -m pip install --quiet pyjwt cryptography 2>&1 | tail -2

          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 << 'PYEOF'
          import urllib.request, json, time, jwt as pyjwt, base64, ssl, os, subprocess
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.backends import default_backend

          p8_path = os.path.expanduser('~/cert_work/p8.key')
          with open(p8_path, 'rb') as f:
              p8_bytes = f.read()
          private_key = serialization.load_pem_private_key(p8_bytes, password=None, backend=default_backend())

          kid = 'HWP45ALL8Y'
          iss = '0bc52ef9-a4c4-489e-810c-c8a80db0ab9a'

          def apple_token():
              payload = {'iss': iss, 'iat': int(time.time()), 'exp': int(time.time()) + 300, 'aud': 'appstoreconnect-v1'}
              return pyjwt.encode(payload, private_key, algorithm='ES256', headers={'kid': kid})

          tok = apple_token()
          headers = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json', 'Accept': 'application/json'}
          ctx = ssl.create_default_context()

          # Generate RSA keypair
          key_path = os.path.expanduser('~/cert_work/dist_private.key')
          subprocess.run(['openssl', 'genrsa', '-out', key_path, '2048'], check=True, capture_output=True)

          # Generate CSR
          csr_path = os.path.expanduser('~/cert_work/dist.csr')
          subj = '/UID=7S96N8A32U/CN=iPhone Distribution: Hong Yang (7S96N8A32U)/OU=7S96N8A32U/O=Hong Yang/C=US'
          subprocess.run(['openssl', 'req', '-new', '-key', key_path, '-out', csr_path,
                         '-subj', subj], check=True, capture_output=True)

          with open(csr_path, 'rb') as f:
              csr_b64 = base64.b64encode(f.read()).decode()

          # Submit CSR to ASC API to create certificate
          payload = json.dumps({
              'data': {
                  'type': 'certificates',
                  'attributes': {'certificateType': 'IOS_DISTRIBUTION', 'csrContent': csr_b64}
              }
          }).encode()

          req = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/certificates',
              data=payload, method='POST', headers=headers
          )
          try:
              with urllib.request.urlopen(req, context=ctx, timeout=15) as resp:
                  result = json.loads(resp.read().decode())
              new_cert_id = result['data']['id']
              print(f'New certificate created! ID: {new_cert_id}')
          except urllib.error.HTTPError as e:
              err_body = e.read()
              if b'already have a current' in err_body:
                  # Find existing cert
                  req_list = urllib.request.Request(
                      'https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION&sort=-createdDate&limit=1',
                      headers={'Authorization': f'Bearer {tok}', 'Accept': 'application/json'}
                  )
                  with urllib.request.urlopen(req_list, context=ctx, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                  new_cert_id = data['data'][0]['id']
                  print(f'Using existing certificate: {new_cert_id}')
              else:
                  print(f'Error: {err_body[:500]}')
                  raise

          # Download certificate
          req2 = urllib.request.Request(
              f'https://api.appstoreconnect.apple.com/v1/certificates/{new_cert_id}',
              headers={'Authorization': f'Bearer {tok}', 'Accept': 'application/json'}
          )
          with urllib.request.urlopen(req2, context=ctx, timeout=15) as resp:
              cert_resp = json.loads(resp.read().decode())

          cert_b64 = cert_resp['data']['attributes']['certificateContent']
          cert_bytes = base64.b64decode(cert_b64)
          cert_path = os.path.expanduser('~/cert_work/dist_new.cer')
          with open(cert_path, 'wb') as f:
              f.write(cert_bytes)
          print(f'Certificate downloaded: {len(cert_bytes)} bytes')

          # Convert to PEM
          pem_path = os.path.expanduser('~/cert_work/dist.pem')
          subprocess.run(['openssl', 'x509', '-inform', 'DER', '-in', cert_path,
                          '-out', pem_path], check=True, capture_output=True)

          # Create .p12
          p12_path = os.path.expanduser('~/cert_work/dist.p12')
          subprocess.run([
              'openssl', 'pkcs12', '-export',
              '-inkey', key_path, '-in', pem_path,
              '-passout', 'pass:', '-out', p12_path
          ], check=True, capture_output=True)
          print(f'P12 created: {os.path.getsize(p12_path)} bytes')
          print('CERT_ID=' + new_cert_id, flush=True)
          PYEOF

      # ── Import certificate into keychain ──────────────────────────────────
      - name: Import certificate
        run: |
          security import ~/cert_work/dist.p12 -k ~/Library/Keychains/$KEYCHAIN_NAME.keychain-db -P "" -T /usr/bin/security 2>&1
          security set-key-partition-list -S apple: -k "$KEYCHAIN_PASS" ~/Library/Keychains/$KEYCHAIN_NAME.keychain-db 2>/dev/null || true
          echo "Certificate imported"

      # ── Provisioning profile: deduplicate then create ────────────────────
      - name: Create provisioning profile via ASC API
        run: |
          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 << 'PYEOF'
          import urllib.request, json, time, jwt as pyjwt, base64, ssl, os
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.backends import default_backend

          with open(os.path.expanduser('~/cert_work/p8.key'), 'rb') as f:
              p8_bytes = f.read()
          private_key = serialization.load_pem_private_key(p8_bytes, password=None, backend=default_backend())

          kid = 'HWP45ALL8Y'
          iss = '0bc52ef9-a4c4-489e-810c-c8a80db0ab9a'

          def apple_token():
              payload = {'iss': iss, 'iat': int(time.time()), 'exp': int(time.time()) + 300, 'aud': 'appstoreconnect-v1'}
              return pyjwt.encode(payload, private_key, algorithm='ES256', headers={'kid': kid})

          tok = apple_token()
          headers = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json', 'Accept': 'application/json'}
          ctx = ssl.create_default_context()

          asc_bundle_id = '24W72MHCCF'
          cert_id = '9L77KJ9P4B'

          # List existing profiles
          req_pf = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/profiles?filter[name]=AIBrainIM-CI-AppStore&sort=-createdDate&limit=20',
              headers=headers
          )
          with urllib.request.urlopen(req_pf, context=ctx, timeout=15) as resp:
              pf_data = json.loads(resp.read().decode())

          existing = pf_data.get('data', [])
          print(f'Found {len(existing)} existing profile(s) named AIBrainIM-CI-AppStore')

          # Delete duplicates
          if len(existing) > 1:
            to_delete = existing[1:]
            print(f'Deleting {len(to_delete)} duplicate profile(s)...')
            for pf in to_delete:
                del_id = pf['id']
                del_req = urllib.request.Request(
                    f'https://api.appstoreconnect.apple.com/v1/profiles/{del_id}',
                    method='DELETE', headers=headers
                )
                try:
                    with urllib.request.urlopen(del_req, context=ctx, timeout=15) as r:
                        print(f'  Deleted {del_id}: {r.status}')
                except Exception as ex:
                    print(f'  Failed to delete {del_id}: {ex}')

          # Create fresh profile
          profile_payload = json.dumps({
              'data': {
                  'type': 'profiles',
                  'attributes': {'name': 'AIBrainIM-CI-AppStore', 'profileType': 'IOS_APP_STORE'},
                  'relationships': {
                      'bundleId': {'data': {'id': asc_bundle_id, 'type': 'bundleIds'}},
                      'certificates': {'data': [{'id': cert_id, 'type': 'certificates'}]}
                  }
              }
          }).encode()

          req_profile = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/profiles',
              data=profile_payload, method='POST', headers=headers
          )
          try:
              with urllib.request.urlopen(req_profile, context=ctx, timeout=15) as resp:
                  prof_result = json.loads(resp.read().decode())
              profile_id = prof_result['data']['id']
              print(f'Profile created! ID: {profile_id}')
          except urllib.error.HTTPError as e:
              err_body = e.read()
              print(f'Profile creation error: {err_body[:300]}')
              raise Exception('Failed to create or find profile')

          # Download profile
          req_download = urllib.request.Request(
              f'https://api.appstoreconnect.apple.com/v1/profiles/{profile_id}',
              headers=headers
          )
          with urllib.request.urlopen(req_download, context=ctx, timeout=15) as resp:
              pf_result = json.loads(resp.read().decode())

          profile_b64 = pf_result['data']['attributes']['profileContent']
          profile_bytes = base64.b64decode(profile_b64)
          out_path = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles/AIBrainIM-CI-AppStore.mobileprovision')
          os.makedirs(os.path.dirname(out_path), exist_ok=True)
          with open(out_path, 'wb') as f:
              f.write(profile_bytes)
          print(f'Profile installed: {out_path} ({len(profile_bytes)} bytes)')
          PYEOF

      # ── Archive with manual signing ──────────────────────────────────────
      - name: Build for Release (Archive)
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASS" ~/Library/Keychains/build.keychain-db
          security set-key-partition-list -S apple: -k "$KEYCHAIN_PASS" ~/Library/Keychains/build.keychain-db 2>/dev/null || true

          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Release \
            -archivePath build/AIBrainIM.xcarchive \
            -derivedDataPath build/DerivedData \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Hong Yang (7S96N8A32U)" \
            DEVELOPMENT_TEAM=7S96N8A32U \
            PROVISIONING_PROFILE=3d8fdd81-ba2a-4074-bb1a-3770fe705ee6

      # ── Export IPA without re-signing ────────────────────────────────────
      - name: Export IPA
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASS" ~/Library/Keychains/build.keychain-db
          security set-key-partition-list -S apple: -k "$KEYCHAIN_PASS" ~/Library/Keychains/build.keychain-db 2>/dev/null || true

          xcodebuild -exportArchive \
            -archivePath build/AIBrainIM.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM=7S96N8A32U

      # ── Upload to App Store Connect ─────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APPLE_DEV_EMAIL: ${{ vars.APPLE_DEV_EMAIL }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "Uploading with email: $APPLE_DEV_EMAIL"
          xcrun altool --upload-app \
            -f build/AIBrainIM.ipa \
            -t ios \
            -u "$APPLE_DEV_EMAIL" \
            -p "$APPLE_APP_PASSWORD" \
            --team-id 7S96N8A32U \
            --upload WaitAfterProcessing 2>&1 | tail -20

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: TestFlight Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
