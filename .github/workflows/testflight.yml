name: TestFlight Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  IOS_BUNDLE_ID: "com.openclaw.aibrainim"
  APP_NAME: "AIBrainIM"

jobs:
  testflight:
    name: Build & Upload TestFlight
    runs-on: macos-15
    environment: App Store Connect
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Install Pods
        run: cd ios && pod install && cd ..

      - name: Set Info.plist build version
        run: |
          BUILD_NUM=${{ github.run_number }}
          PLIST=ios/AIBrainIM/Info.plist
          if grep -q CFBundleVersion "$PLIST"; then
            sed -i '' "s/<key>CFBundleVersion<\/key><string>[^<]*<\/string>/<key>CFBundleVersion<\/key><string>${BUILD_NUM}<\/string>/" "$PLIST"
          fi
          echo "Build number set to: ${BUILD_NUM}"

      # ── Step 1: Generate RSA private key + CSR in the runner ──────────────────
      - name: Generate RSA private key and CSR
        run: |
          mkdir -p ~/cert_work
          openssl genrsa -out ~/cert_work/dist_private.key 2048
          openssl req -new -key ~/cert_work/dist_private.key \
            -out ~/cert_work/dist.csr \
            -subj "/UID=7S96N8A32U/CN=iPhone Distribution: Hong Yang (7S96N8A32U)/OU=7S96N8A32U/O=Hong Yang/C=US"
          echo "Private key and CSR generated"

      # ── Step 2: Download WWDR G3 and setup keychain ─────────────────────────
      - name: Setup keychain and import WWDR G3
        run: |
          mkdir -p ~/Library/Keychains
          security create-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db
          security set-keychain-settings -t 3600 -u ~/Library/Keychains/build.keychain-db
          security list-keychains -s ~/Library/Keychains/build.keychain-db

          curl -s -o /tmp/wwdrg3.der http://certs.apple.com/wwdrg3.der
          openssl x509 -inform DER -outform PEM -in /tmp/wwdrg3.der -out /tmp/wwdrg3.pem
          security import /tmp/wwdrg3.pem -k ~/Library/Keychains/build.keychain-db -T /usr/bin/codesign -T /usr/bin/security
          echo "WWDR G3 imported"

      # ── Step 3: Submit CSR to ASC API to get distribution certificate ────────
      - name: Create iOS Distribution certificate via ASC API
        run: |
          # Decode the p8 key from base64 secret
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 -d > ~/cert_work/p8.key
          echo "p8 key decoded, $(wc -c < ~/cert_work/p8.key) bytes"

          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 -m pip install PyJWT cryptography --quiet 2>&1 | tail -2

          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 << 'PYEOF'
          import urllib.request, json, time, jwt as pyjwt, base64, os

          with open(os.path.expanduser('~/cert_work/dist.csr'), 'rb') as f:
              csr_bytes = f.read()
          csr_b64 = base64.b64encode(csr_bytes).decode()

          with open(os.path.expanduser('~/cert_work/p8.key'), 'r') as f:
              p8_content = f.read().strip()

          kid = 'HWP45ALL8Y'
          iss = '0bc52ef9-a4c4-489e-810c-c8a80db0ab9a'

          def apple_token():
              payload = {'iss': iss, 'iat': int(time.time()), 'exp': int(time.time()) + 300, 'aud': 'appstoreconnect-v1'}
              return pyjwt.encode(payload, p8_content, algorithm='ES256', headers={'kid': kid})

          tok = apple_token()
          headers = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json', 'Accept': 'application/json'}

          payload = json.dumps({
              'data': {
                  'type': 'certificates',
                  'attributes': {
                      'certificateType': 'IOS_DISTRIBUTION',
                      'csrContent': csr_b64
                  }
              }
          }).encode()

          req = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/certificates',
              data=payload, method='POST', headers=headers
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  result = json.loads(resp.read().decode())
              cert_id = result['data']['id']
              print(f'Certificate created! ID: {cert_id}')
          except Exception as e:
              if hasattr(e, 'read'):
                  err_body = e.read()
                  if b'already have a current' in err_body:
                      req3 = urllib.request.Request(
                          'https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION',
                          headers=headers
                      )
                      with urllib.request.urlopen(req3, timeout=15) as resp:
                          certs_data = json.loads(resp.read().decode())
                      cert_id = certs_data['data'][0]['id']
                      print(f'Using existing cert: {cert_id}')
                  else:
                      print(f'Error: {err_body[:300]}')
                      raise
              else:
                  raise

          req2 = urllib.request.Request(
              f'https://api.appstoreconnect.apple.com/v1/certificates/{cert_id}',
              headers={'Authorization': f'Bearer {tok}', 'Accept': 'application/json'}
          )
          with urllib.request.urlopen(req2, timeout=15) as resp:
              cert_resp = json.loads(resp.read().decode())
          cert_b64 = cert_resp['data']['attributes']['certificateContent']
          cert_bytes = base64.b64decode(cert_b64)
          with open(os.path.expanduser('~/cert_work/dist.cer'), 'wb') as f:
              f.write(cert_bytes)
          print(f'Certificate saved, {len(cert_bytes)} bytes, serial: {cert_resp["data"]["attributes"]["serialNumber"]}')
          print(f'CERT_ID={cert_id}')
          PYEOF

      # ── Step 4: Build .p12 from private key + certificate ─────────────────
      - name: Build .p12 from private key and certificate
        run: |
          openssl x509 -inform DER -in ~/cert_work/dist.cer -out ~/cert_work/dist.pem

          OPENSSL_CONF=/dev/null openssl pkcs12 -export \
            -inkey ~/cert_work/dist_private.key \
            -in ~/cert_work/dist.pem \
            -certfile /tmp/wwdrg3.pem \
            -out ~/cert_work/dist.p12 \
            -password pass:ci-pass

          echo "p12 created: $(wc -c < ~/cert_work/dist.p12) bytes"

      # ── Step 5: Import .p12 to CI keychain ─────────────────────────────────
      - name: Import signing certificate to keychain
        run: |
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db
          security import ~/cert_work/dist.p12 -k ~/Library/Keychains/build.keychain-db -P "ci-pass" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          echo "Certificate imported to keychain"
          security find-identity -v -p codesigning ~/Library/Keychains/build.keychain-db

      # ── Step 6: Create provisioning profile via ASC API ────────────────────
      - name: Create provisioning profile via ASC API
        run: |
          # Install jwt to Xcode Python (same python3 used in this step)
          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 -m pip install PyJWT cryptography --quiet 2>&1 | tail -2
          /Applications/Xcode.app/Contents/Developer/usr/bin/python3 << 'PYEOF'
          import urllib.request, json, time, jwt as pyjwt, base64, plistlib

          with open(os.path.expanduser('~/cert_work/p8.key'), 'r') as f:
              p8_content = f.read().strip()

          kid = 'HWP45ALL8Y'
          iss = '0bc52ef9-a4c4-489e-810c-c8a80db0ab9a'

          def apple_token():
              payload = {'iss': iss, 'iat': int(time.time()), 'exp': int(time.time()) + 300, 'aud': 'appstoreconnect-v1'}
              return pyjwt.encode(payload, p8_content, algorithm='ES256', headers={'kid': kid})

          tok = apple_token()
          headers = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json', 'Accept': 'application/json'}

          # Get bundle ID
          bundle_id = "com.openclaw.aibrainim"
          req0 = urllib.request.Request(
              f'https://api.appstoreconnect.apple.com/v1/bundleIds?filter[identifier]={bundle_id}',
              headers=headers
          )
          try:
              with urllib.request.urlopen(req0, timeout=15) as resp:
                  data = json.loads(resp.read().decode())
              if data.get('data'):
                  asc_bundle_id = data['data'][0]['id']
                  print(f'Bundle ID exists: {asc_bundle_id}')
              else:
                  req_new = urllib.request.Request(
                      'https://api.appstoreconnect.apple.com/v1/bundleIds',
                      data=json.dumps({'data': {'type': 'bundleIds', 'attributes': {'identifier': bundle_id, 'platforms': ['IOS']}}}).encode(),
                      method='POST', headers=headers
                  )
                  with urllib.request.urlopen(req_new, timeout=15) as resp:
                      result = json.loads(resp.read().decode())
                  asc_bundle_id = result['data']['id']
                  print(f'Bundle ID created: {asc_bundle_id}')
          except Exception as e:
              if hasattr(e, 'read') and b'already exists' in (e.read() or b''):
                  req_find = urllib.request.Request(
                      f'https://api.appstoreconnect.apple.com/v1/bundleIds?filter[identifier]={bundle_id}',
                      headers=headers
                  )
                  with urllib.request.urlopen(req_find, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                  asc_bundle_id = data['data'][0]['id']
                  print(f'Bundle ID found: {asc_bundle_id}')
              else:
                  raise

          # Get the distribution cert
          req_certs = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION',
              headers=headers
          )
          with urllib.request.urlopen(req_certs, timeout=15) as resp:
              certs_data = json.loads(resp.read().decode())
          cert_id = certs_data['data'][0]['id']
          print(f'Using cert ID: {cert_id}')

          # Create ADHOC provisioning profile
          profile_payload = json.dumps({
              'data': {
                  'type': 'profiles',
                  'attributes': {
                      'name': 'AIBrainIM-CI-AdHoc',
                      'profileType': 'IOS_APP_ADHOC'
                  },
                  'relationships': {
                      'bundleId': {'data': {'id': asc_bundle_id, 'type': 'bundleIds'}},
                      'certificates': {'data': [{'id': cert_id, 'type': 'certificates'}]}
                  }
              }
          }).encode()

          req_profile = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/profiles',
              data=profile_payload, method='POST', headers=headers
          )
          try:
              with urllib.request.urlopen(req_profile, timeout=15) as resp:
                  prof_result = json.loads(resp.read().decode())
              profile_id = prof_result['data']['id']
              print(f'Profile created! ID: {profile_id}')
          except Exception as e:
              if hasattr(e, 'read'):
                  err_body = e.read()
                  print(f'Profile creation error: {err_body[:300]}')
              req_pf_list = urllib.request.Request(
                  'https://api.appstoreconnect.apple.com/v1/profiles?filter[name]=AIBrainIM-CI-AdHoc',
                  headers=headers
              )
              with urllib.request.urlopen(req_pf_list, timeout=15) as resp:
                  pf_data = json.loads(resp.read().decode())
              if pf_data.get('data'):
                  profile_id = pf_data['data'][0]['id']
                  print(f'Using existing profile: {profile_id}')
              else:
                  raise Exception('No profile found')

          # Download the profile
          req_download = urllib.request.Request(
              f'https://api.appstoreconnect.apple.com/v1/profiles/{profile_id}',
              headers=headers
          )
          with urllib.request.urlopen(req_download, timeout=15) as resp:
              pf_result = json.loads(resp.read().decode())
          profile_b64 = pf_result['data']['attributes']['profileContent']
          profile_bytes = base64.b64decode(profile_b64)
          with open(os.path.expanduser('~/cert_work/profile.mobileprovision'), 'wb') as f:
              f.write(profile_bytes)
          pf_plist = plistlib.loads(profile_bytes)
          print(f'Profile downloaded, {len(profile_bytes)} bytes, UUID: {pf_plist.get("UUID")}')
          print(f'TeamName: {pf_plist.get("TeamName")}')
          PYEOF

      # ── Step 7: Install provisioning profile ─────────────────────────────────
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ~/cert_work/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "Profile installed"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Step 8: Archive the app ────────────────────────────────────────────
      - name: Build for Release (Archive)
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db

          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Release \
            -archivePath build/AIBrainIM.xcarchive \
            -derivedDataPath build/DerivedData \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Hong Yang (7S96N8A32U)" \
            DEVELOPMENT_TEAM=1165010090 \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Step 9: Export IPA ─────────────────────────────────────────────────
      - name: Export IPA
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p "build-pass" ~/Library/Keychains/build.keychain-db

          xcodebuild -exportArchive \
            -archivePath build/AIBrainIM.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Hong Yang (7S96N8A32U)" \
            DEVELOPMENT_TEAM=1165010090

      # ── Step 10: Upload to App Store Connect ──────────────────────────────
      - name: Upload to App Store Connect
        env:
          APPLE_DEV_EMAIL: ${{ vars.APPLE_DEV_EMAIL }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "Uploading with email: $APPLE_DEV_EMAIL"
          xcrun altool --upload-app \
            -f build/AIBrainIM.ipa \
            -t ios \
            -u "$APPLE_DEV_EMAIL" \
            -p "$APPLE_APP_PASSWORD" \
            --team-id 1165010090 \
            --upload WaitAfterProcessing 2>&1 | tail -20

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: TestFlight Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}