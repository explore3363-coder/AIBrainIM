name: CI / Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  # ── TypeScript + Jest ─────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  # ── iOS Simulator Build ───────────────────────────────────────────────────────
  ios-sim:
    name: iOS Simulator Build
    runs-on: macos-15
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache CocoaPods
        uses: actions/cache@v4
        id: pod-cache
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - run: npm ci

      - name: Pod install
        run: cd ios && pod install && cd ..

      - name: Build for Simulator
        run: |
          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build-logs
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 7

  # ── TestFlight Build (on tag) ─────────────────────────────────────────────────
  tf-build:
    name: TestFlight Build
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    needs: typecheck
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - run: npm ci

      - name: Pod install
        run: cd ios && pod install && cd ..

      # Install Fastlane
      - name: Install Fastlane
        run: brew install fastlane

      # Create App Store Connect API key from secret
      # APPLE_API_KEY_CONTENT is stored as raw .p8 PEM text in the secret (NOT base64 encoded)
      - name: Create API key file
        run: |
          KEY_FILE="/tmp/api_key.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_FILE"
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_FILE"; then
            echo "ERROR: APPLE_API_KEY_CONTENT does not look like a valid PEM file"
            cat "$KEY_FILE"
            exit 1
          fi
          echo "KEY_FILE=$KEY_FILE" >> $GITHUB_ENV
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      # Build Release archive
      - name: Build Release Archive
        run: |
          # Import distribution certificate from p12 secret
          mkdir -p ~/Library/Keychains/ci-build
          security create-keychain -p "ci-pass" ~/Library/Keychains/ci-build/keychain-db
          security set-keychain-settings -t 3600 -u ~/Library/Keychains/ci-build/keychain-db
          security unlock-keychain -p "ci-pass" ~/Library/Keychains/ci-build/keychain-db

          # Decode p12 and import into CI keychain
          echo "$APPLE_DIST_P12" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k ~/Library/Keychains/ci-build/keychain-db -P "ci-pass" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple:,apple-tool:,codesign: -s -k "ci-pass" ~/Library/Keychains/ci-build/keychain-db

          security list-keychains --user ~/Library/Keychains/ci-build/keychain-db

          # Build archive with distribution signing
          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Release \
            -archivePath fastlane/builds/AIBrainIM.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Hong Yang (7S96N8A32U)" \
            DEVELOPMENT_TEAM=1165010090 \
            -allowProvisioningUpdates
        env:
          APPLE_DIST_P12: ${{ secrets.APPLE_DIST_P12 }}

      - name: Export .ipa
        run: |
          security unlock-keychain -p "ci-pass" ~/Library/Keychains/ci-build/keychain-db

          xcodebuild -exportArchive \
            -archivePath fastlane/builds/AIBrainIM.xcarchive \
            -exportPath fastlane/builds \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Hong Yang (7S96N8A32U)" \
            DEVELOPMENT_TEAM=1165010090

      - name: Upload to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            -type ios \
            -file fastlane/builds/AIBrainIM.ipa \
            -apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            -apiKeyPath "$KEY_FILE"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## AIBrainIM ${{ github.ref_name }}

            **P1 可用版：AI 驾驶舱 + 对话 + 附件上传 + 调度链**

            ### TestFlight
            Build is uploaded to App Store Connect. Check TestFlight → Builds.

            ### Changes
            ${{ github.event.head_commit.message }}
          files: fastlane/builds/AIBrainIM.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
