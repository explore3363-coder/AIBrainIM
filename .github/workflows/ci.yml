name: CI / Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  # ── TypeScript + Jest ─────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  # ── iOS Simulator Build ───────────────────────────────────────────────────────
  ios-sim:
    name: iOS Simulator Build
    runs-on: macos-15
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache CocoaPods
        uses: actions/cache@v4
        id: pod-cache
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - run: npm ci

      - name: Pod install
        run: cd ios && pod install && cd ..

      - name: Build for Simulator
        run: |
          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build-logs
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 7

  # ── TestFlight Build (on tag) ─────────────────────────────────────────────────
  tf-build:
    name: TestFlight Build
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    needs: typecheck
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - run: npm ci

      - name: Pod install
        run: cd ios && pod install && cd ..

      # Install Fastlane
      - name: Install Fastlane
        run: brew install fastlane

      # Create App Store Connect API key from secret
      - name: Create API key file
        run: |
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 -d > fastlane/apple_auth_key.p8
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      # Build Release archive
      - name: Build Release Archive
        run: |
          xcodebuild -workspace ios/AIBrainIM.xcworkspace \
            -scheme AIBrainIM \
            -configuration Release \
            -archivePath fastlane/builds/AIBrainIM.xcarchive \
            archive

      # Export .ipa
      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath fastlane/builds/AIBrainIM.xcarchive \
            -exportPath fastlane/builds \
            -exportOptionsPlist ios/ExportOptions.plist

      # Upload to TestFlight
      - name: Upload to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            -type ios \
            -file fastlane/builds/AIBrainIM.ipa \
            -apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            -apiKeyPath fastlane/apple_auth_key.p8 \
            --type JSON
        env:
          FASTLANE_APP_STORE_CONNECT_API_KEY_PATH: fastlane/apple_auth_key.p8
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## AIBrainIM ${{ github.ref_name }}

            **P1 可用版：AI 驾驶舱 + 对话 + 附件上传 + 调度链**

            ### TestFlight
            Build is uploaded to App Store Connect. Check TestFlight → Builds.

            ### Changes
            ${{ github.event.head_commit.message }}
          files: fastlane/builds/AIBrainIM.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
